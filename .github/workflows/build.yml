name: Build and Deploy Firmware

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Update index and install core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Install dependencies
        run: |
          arduino-cli lib install "Keyboard"
          arduino-cli lib install "SD"

      - name: Compile
        run: |
          arduino-cli compile --fqbn arduino:avr:leonardo ./Keyboard_automator_ch --output-dir ./build-output

      - name: Prepare firmware for Web-Loader
        run: |
          mkdir -p ./deploy
          cp ./build-output/Keyboard_automator_ch.ino.hex ./deploy/firmware.hex

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: keyboard-automator-ch-firmware
          path: ./deploy/firmware.hex

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy web-loader firmware.hex"
